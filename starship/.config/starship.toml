# в”Җв”Җ Custom: Timetrack в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Reads ~/.timetrack/current (task on line 1, RFC3339 timestamp on line 2)
# and displays: [<task> (<Xh YYm>)] or [<task> (<Zm>)]
[custom.timetrack]
description = "Current timetrack task and elapsed time"
command = """
cache_file="$HOME/.timetrack/current"
[ -f "$cache_file" ] || exit 1
task=$(head -1 "$cache_file")
start_time=$(tail -1 "$cache_file")
start_sec=$(date -d "$start_time" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${start_time%Z}" +%s 2>/dev/null)
[ -z "$start_sec" ] && { printf '%s' "$task"; exit 0; }
elapsed_mins=$(( ($(date +%s) - start_sec) / 60 ))
hours=$((elapsed_mins / 60))
mins=$((elapsed_mins % 60))
if [ $hours -gt 0 ]; then
  printf '%s (%dh%02dm)' "$task" "$hours" "$mins"
else
  printf '%s (%dm)' "$task" "$mins"
fi
"""
when = 'test -f "$HOME/.timetrack/current"'
format = '[ \[$output\]](purple) '


